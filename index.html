<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>照鉴</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap');
  :root {
    --bg: #08080a; --surface: #0f0f13; --raised: #16161c; --border: #1e1e26;
    --bsub: #14141a; --text: #c8c8d0; --dim: #5c5c6a; --muted: #3a3a46;
    --accent: #8b7ec8; --accdim: #5a5080; --obs: #d8d4e0; --think: #44445a;
    --vent: #6b8f71; --danger: #c87070;
    --serif: 'Noto Serif SC','Songti SC',serif;
    --mono: 'IBM Plex Mono','SF Mono',monospace;
    --sans: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--sans); background:var(--bg); color:var(--text); height:100vh; height:100dvh; overflow:hidden; font-size:15px; line-height:1.7; }
  .app { display:flex; height:100vh; height:100dvh; }

  /* === Mobile nav === */
  .mobile-nav { display:none; position:fixed; top:0; left:0; right:0; z-index:50; background:var(--surface); border-bottom:1px solid var(--border); padding:0 12px; height:48px; align-items:center; gap:8px; }
  .mobile-nav .back-btn { background:none; border:none; color:var(--dim); cursor:pointer; font-size:18px; padding:6px 8px; line-height:1; }
  .mobile-nav .nav-title { font-family:var(--serif); font-size:15px; color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mobile-nav .nav-sub { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; }
  .mobile-nav .nav-action { background:none; border:none; color:var(--dim); cursor:pointer; font-family:var(--mono); font-size:11px; padding:6px 8px; }

  /* === Panel: Containers === */
  .panel-containers { width:200px; min-width:200px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .panel-header { padding:20px 16px 16px; border-bottom:1px solid var(--bsub); }
  .panel-header h1 { font-family:var(--serif); font-weight:300; font-size:22px; letter-spacing:8px; color:var(--dim); }
  .panel-header .sub { font-size:10px; color:var(--muted); letter-spacing:2px; font-family:var(--mono); }
  .list { flex:1; overflow-y:auto; padding:6px 0; }
  .list-item { padding:10px 16px; cursor:pointer; border-left:2px solid transparent; transition:all .12s; position:relative; }
  .list-item:hover { background:var(--raised); }
  .list-item.active { background:var(--raised); border-left-color:var(--accdim); }
  .list-item .name { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .list-item .meta { font-size:10px; color:var(--muted); font-family:var(--mono); }
  .list-item .del { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; opacity:0; transition:opacity .12s; padding:4px; }
  .list-item:hover .del { opacity:1; }
  .list-item .del:hover { color:var(--danger); }
  .add-btn { margin:6px 12px 12px; padding:8px; background:none; border:1px dashed var(--border); color:var(--dim); cursor:pointer; font-size:12px; font-family:var(--sans); border-radius:3px; transition:all .12s; }
  .add-btn:hover { border-color:var(--accdim); color:var(--accent); }
  .panel-foot { padding:10px 12px; border-top:1px solid var(--bsub); }
  .panel-foot .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .uname { font-family:var(--mono); font-size:11px; color:var(--dim); }
  .sm-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:10px; font-family:var(--mono); padding:2px 0; transition:color .12s; }
  .sm-btn:hover { color:var(--dim); }
  .sm-btn.cfg { color:var(--vent); }
  .sm-btn.out:hover { color:var(--danger); }

  /* === Panel: Threads === */
  .panel-threads { width:240px; min-width:240px; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  .panel-threads .head { padding:14px 16px; border-bottom:1px solid var(--bsub); display:flex; align-items:center; justify-content:space-between; }
  .panel-threads .head .cname { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .panel-threads .head .dash-btn { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:3px; transition:all .12s; white-space:nowrap; }
  .panel-threads .head .dash-btn:hover { border-color:var(--accdim); color:var(--dim); }
  .panel-threads .head .dash-btn.active { border-color:var(--accdim); color:var(--accent); }
  .thread-item { padding:12px 16px; cursor:pointer; border-left:2px solid transparent; transition:all .12s; position:relative; }
  .thread-item:hover { background:var(--raised); }
  .thread-item.active { background:var(--raised); border-left-color:var(--accdim); }
  .thread-item .title { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .thread-item .tmeta { font-size:10px; color:var(--muted); font-family:var(--mono); margin-top:2px; }
  .thread-item .ttype { font-size:9px; font-family:var(--mono); letter-spacing:1px; text-transform:uppercase; padding:1px 5px; border-radius:2px; background:var(--raised); }
  .thread-item .ttype.reflect { color:var(--accdim); }
  .thread-item .ttype.vent { color:var(--vent); }
  .thread-item .del { position:absolute; right:8px; top:12px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; opacity:0; transition:opacity .12s; }
  .thread-item:hover .del { opacity:1; }
  .thread-item .del:hover { color:var(--danger); }
  .thread-item .pin-btn { position:absolute; right:28px; top:12px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px; opacity:0.3; transition:all .12s; padding:0; }
  .thread-item:hover .pin-btn { opacity:0.8; color:var(--dim); }
  .thread-item .pin-btn.pinned { opacity:1; color:var(--vent); }

  /* === Panel: Chat / Dashboard === */
  .panel-chat { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--muted); }
  .empty .big { font-family:var(--serif); font-size:56px; font-weight:300; color:var(--border); margin-bottom:12px; }
  .empty p { font-size:12px; letter-spacing:1px; }

  /* === Dashboard === */
  .dashboard { flex:1; overflow-y:auto; padding:28px 32px; }
  .dash-section { margin-bottom:32px; }
  .dash-section-title { font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .dash-stats { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:28px; }
  .dash-stat { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:14px 18px; min-width:110px; flex:1; }
  .dash-stat .val { font-family:var(--mono); font-size:22px; color:var(--text); font-weight:400; }
  .dash-stat .lbl { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; }

  /* Affect chart */
  .affect-chart { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:16px; overflow-x:auto; }
  .affect-chart svg { display:block; width:100%; height:auto; }
  .affect-legend { display:flex; gap:16px; margin-top:10px; }
  .affect-legend span { font-family:var(--mono); font-size:10px; color:var(--muted); display:flex; align-items:center; gap:5px; }
  .affect-legend .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

  /* Bar charts */
  .bar-chart { display:flex; flex-direction:column; gap:6px; }
  .bar-row { display:flex; align-items:center; gap:10px; }
  .bar-label { font-family:var(--mono); font-size:11px; color:var(--dim); min-width:120px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar-track { flex:1; height:16px; background:var(--surface); border-radius:2px; position:relative; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; transition:width .4s ease; min-width:2px; }
  .bar-fill.theme { background:var(--accdim); }
  .bar-fill.distortion { background:var(--danger); opacity:0.6; }
  .bar-count { font-family:var(--mono); font-size:10px; color:var(--muted); min-width:24px; }

  /* Salience */
  .salience-list { display:flex; flex-wrap:wrap; gap:6px; }
  .salience-tag { font-family:var(--serif); font-size:13px; color:var(--dim); background:var(--surface); border:1px solid var(--border); padding:4px 12px; border-radius:3px; }

  /* Activity */
  .activity-row { display:flex; gap:3px; flex-wrap:wrap; align-items:flex-end; }
  .activity-day { width:12px; height:12px; border-radius:2px; background:var(--surface); border:1px solid var(--border); }

  /* Empty dashboard state */
  .dash-empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .dash-empty .icon { font-size:40px; color:var(--border); margin-bottom:12px; }
  .dash-empty p { font-size:13px; line-height:1.8; max-width:320px; margin:0 auto; }

  /* === Chat === */
  .chat-feed { flex:1; overflow-y:auto; padding:28px 40px; }
  .msg { margin-bottom:24px; max-width:640px; position:relative; }
  .msg .msg-del { position:absolute; right:0; top:0; background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; opacity:0; transition:opacity .12s; padding:4px; font-family:var(--mono); }
  .msg:hover .msg-del { opacity:1; }
  .msg .msg-del:hover { color:var(--danger); }
  .msg-head { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .msg-role { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); }
  .msg-role.user { color:var(--dim); }
  .msg-role.assistant { color:var(--accdim); }
  .msg-time { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .msg-body { font-family:var(--serif); font-size:15px; line-height:1.9; }
  .msg-body.user-text { color:var(--text); }
  .msg-body.ai-text { color:var(--obs); padding-left:14px; border-left:2px solid var(--accdim); }
  .msg-body.vent-text { color:var(--dim); font-style:italic; padding-left:14px; border-left:2px solid var(--vent); }

  .skill-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
  .skill-tag { font-family:var(--mono); font-size:9px; letter-spacing:1px; color:var(--muted); background:var(--bsub); border:1px solid var(--border); padding:1px 7px; border-radius:2px; cursor:default; transition:color .12s; }
  .skill-tag:hover { color:var(--dim); }
  .derived-bar { display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .affect-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
  .affect-label { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:0.5px; }
  .theme-tag { font-family:var(--mono); font-size:9px; letter-spacing:0.5px; color:var(--dim); background:transparent; border:1px solid var(--border); padding:1px 6px; border-radius:2px; cursor:default; }
  .distortion-tag { font-family:var(--mono); font-size:9px; letter-spacing:0.5px; color:var(--danger); background:transparent; border:1px solid rgba(200,112,112,.2); padding:1px 6px; border-radius:2px; cursor:default; opacity:0.7; }

  .think-toggle { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px; padding:3px 0; margin-top:6px; transition:color .12s; }
  .think-toggle:hover { color:var(--dim); }
  .think-box { display:none; margin-top:6px; padding:10px 14px; background:var(--surface); border-radius:3px; font-family:var(--mono); font-size:11px; line-height:1.8; color:var(--think); white-space:pre-wrap; max-height:350px; overflow-y:auto; }
  .think-box.open { display:block; }

  .stream-block { margin-bottom:24px; max-width:640px; }
  .stream-phase { font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:4px; letter-spacing:1px; }
  .stream-skills { display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap; }
  .stream-think { font-family:var(--mono); font-size:11px; line-height:1.8; color:var(--think); white-space:pre-wrap; max-height:250px; overflow-y:auto; }
  .stream-content { font-family:var(--serif); font-size:15px; line-height:1.9; color:var(--obs); padding-left:14px; border-left:2px solid var(--accdim); }
  .stream-derived { margin-top:8px; }

  /* === Chat input === */
  .chat-input { padding:16px 40px 24px; border-top:1px solid var(--bsub); background:var(--surface); }
  .input-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .type-tog { display:flex; background:var(--bg); border-radius:3px; border:1px solid var(--border); overflow:hidden; }
  .type-tog button { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px; letter-spacing:1.5px; padding:5px 12px; text-transform:uppercase; transition:all .12s; }
  .type-tog button.on { background:var(--raised); color:var(--text); }
  .type-tog button.on.reflect { color:var(--accent); }
  .type-tog button.on.vent { color:var(--vent); }
  .cc { font-family:var(--mono); font-size:10px; color:var(--muted); margin-left:auto; }
  .input-row { display:flex; gap:10px; align-items:flex-end; }
  .input-row textarea { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--serif); font-size:15px; line-height:1.8; padding:12px 14px; resize:none; border-radius:3px; min-height:52px; max-height:180px; outline:none; transition:border-color .12s; }
  .input-row textarea:focus { border-color:var(--accdim); }
  .input-row textarea::placeholder { color:var(--muted); }
  .send { background:var(--raised); border:1px solid var(--border); color:var(--dim); cursor:pointer; padding:12px 18px; border-radius:3px; font-family:var(--mono); font-size:11px; transition:all .12s; white-space:nowrap; }
  .send:hover { border-color:var(--accdim); color:var(--accent); }
  .send:disabled { opacity:.3; cursor:not-allowed; }
  .err-msg { padding:10px 14px; background:rgba(200,112,112,.1); border:1px solid rgba(200,112,112,.2); color:var(--danger); font-size:12px; border-radius:3px; margin-top:6px; }

  /* === Context window === */
  .context-win { position:absolute; bottom:calc(100% + 8px); right:40px; background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:10px 14px; width:260px; font-size:12px; z-index:10; }
  .context-win.hidden { display:none; }
  .ctx-badge { font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:1px 6px; border-radius:2px; }
  .ctx-badge.auto { color:var(--accdim); background:transparent; border:1px solid var(--accdim); }
  .ctx-badge.pinned { color:var(--vent); background:transparent; border:1px solid var(--vent); }
  .ctx-title { color:var(--text); margin:4px 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:12px; }
  .ctx-preview { color:var(--muted); font-size:11px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  @keyframes ctx-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .context-win:not(.hidden) { animation:ctx-in .2s ease; }

  /* === Entry picker === */
  .pin-entries-btn { background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px; padding:4px 10px; border-radius:3px; transition:all .12s; white-space:nowrap; position:relative; }
  .pin-entries-btn:hover { border-color:var(--accdim); color:var(--dim); }
  .pin-entries-btn.has-pins { border-color:var(--vent); color:var(--vent); }
  .pin-count { position:absolute; top:-6px; right:-6px; background:var(--vent); color:var(--bg); font-size:8px; width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; }
  .entry-picker { display:none; position:absolute; bottom:calc(100% + 8px); left:40px; right:40px; background:var(--surface); border:1px solid var(--border); border-radius:6px; z-index:20; max-height:360px; overflow:hidden; flex-direction:column; }
  .entry-picker.open { display:flex; }
  .ep-head { padding:12px 16px; border-bottom:1px solid var(--bsub); display:flex; align-items:center; justify-content:space-between; }
  .ep-head-title { font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:1px; }
  .ep-head-actions { display:flex; gap:8px; align-items:center; }
  .ep-clear { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px; transition:color .12s; }
  .ep-clear:hover { color:var(--danger); }
  .ep-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:0 2px; line-height:1; }
  .ep-close:hover { color:var(--dim); }
  .ep-list { flex:1; overflow-y:auto; padding:4px 0; }
  .ep-item { padding:10px 16px; cursor:pointer; border-left:3px solid transparent; transition:all .12s; }
  .ep-item:hover { background:var(--raised); }
  .ep-item.selected { border-left-color:var(--vent); background:rgba(107,143,113,.06); }
  .ep-item-head { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
  .ep-item-date { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .ep-item-thread { font-family:var(--mono); font-size:9px; color:var(--muted); background:var(--bsub); padding:0 5px; border-radius:2px; max-width:120px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ep-item-preview { font-family:var(--serif); font-size:13px; color:var(--text); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .ep-item-meta { display:flex; gap:5px; margin-top:4px; flex-wrap:wrap; align-items:center; }
  .ep-empty { padding:24px 16px; text-align:center; color:var(--muted); font-size:12px; }

  /* === Modals === */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:28px; width:380px; max-width:90vw; }
  .modal h2 { font-family:var(--serif); font-weight:400; font-size:17px; margin-bottom:18px; }
  .modal label { display:block; font-size:11px; color:var(--dim); margin-bottom:5px; font-family:var(--mono); letter-spacing:1px; }
  .modal input,.modal textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--sans); font-size:14px; padding:10px 12px; border-radius:3px; margin-bottom:14px; outline:none; }
  .modal input:focus,.modal textarea:focus { border-color:var(--accdim); }
  .modal textarea { resize:vertical; min-height:56px; }
  .modal-acts { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }
  .modal-acts button { background:none; border:1px solid var(--border); color:var(--dim); cursor:pointer; padding:7px 18px; border-radius:3px; font-size:13px; transition:all .12s; }
  .modal-acts button:hover { border-color:var(--accdim); color:var(--text); }
  .modal-acts button.pri { background:var(--raised); border-color:var(--accdim); color:var(--accent); }
  .hint { font-size:10px; color:var(--muted); margin-top:-10px; margin-bottom:14px; }
  ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* ==================================
     MOBILE RESPONSIVE
     ================================== */
  @media (max-width: 768px) {
    .app { flex-direction:column; }
    .mobile-nav { display:flex; }
    .panel-containers, .panel-threads, .panel-chat {
      position:fixed; top:48px; left:0; right:0; bottom:0;
      width:100% !important; min-width:0 !important;
      border-right:none !important;
      transition: transform .2s ease, opacity .15s ease;
    }
    .panel-containers { z-index:30; }
    .panel-threads { z-index:31; }
    .panel-chat { z-index:32; }
    .mob-hidden { transform:translateX(-100%); opacity:0; pointer-events:none; }
    .mob-right { transform:translateX(100%); opacity:0; pointer-events:none; }
    .mob-visible { transform:translateX(0); opacity:1; pointer-events:auto; }
    .panel-header { padding:14px 16px 12px; }
    .panel-header h1 { font-size:18px; letter-spacing:6px; }
    .chat-feed { padding:20px 16px; }
    .chat-input { padding:12px 16px 16px; }
    .entry-picker { left:8px; right:8px; }
    .context-win { right:16px; left:16px; width:auto; }
    .dashboard { padding:20px 16px; }
    .dash-stats { gap:10px; }
    .dash-stat { min-width:80px; padding:10px 14px; }
    .bar-label { min-width:80px; font-size:10px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Mobile nav bar -->
  <div class="mobile-nav" id="mobileNav">
    <button class="back-btn" id="mobBack" onclick="mobGoBack()" style="display:none">‹</button>
    <span class="nav-title" id="mobTitle">照鉴</span>

    <!-- Dashboard view -->

      <div class="dashboard" id="dashContent"></div>
    </div>

    <!-- Chat view -->
    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-feed" id="feed"></div>
      <div style="position:relative">
        <div class="context-win hidden" id="contextWin">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px">参照</span>
            <span class="ctx-badge" id="ctxBadge"></span>
            <button onclick="clearContextPin()" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1">×</button>

          <div class="ctx-title" id="ctxTitle"></div>
          <div class="ctx-preview" id="ctxPreview"></div>

        <div class="entry-picker" id="entryPicker">
          <div class="ep-head">
            <span class="ep-head-title">选择参照记录</span>

              <button class="ep-clear" onclick="clearEntryPins()">清空</button>
              <button class="ep-close" onclick="closeEntryPicker()">×</button>

              <button class="on reflect" data-t="reflect" onclick="setType('reflect')">审视</button>
              <button data-t="vent" onclick="setType('vent')">倾诉</button>
            </div>
            <button class="pin-entries-btn" id="pinEntriesBtn" onclick="toggleEntryPicker()" title="选择参照记录">参照</button>
            <span class="cc" id="cc">0</span>

          <div class="input-row">
            <textarea id="inp" placeholder="写点什么..." rows="2" oninput="onInput()"></textarea>

<div class="modal-bg" id="containerModal"><div class="modal">
  <h2>新容器</h2>
  <label>名称</label><input id="cNameIn" placeholder="例：工作压力">
  <label>描述（可选）</label><textarea id="cDescIn" placeholder="想在这个容器里装点什么？"></textarea>
  <div class="modal-acts"><button onclick="closeModals()">取消</button><button class="pri" onclick="doCreateContainer()">创建</button></div>
</div></div>
<div class="modal-bg" id="apikeyModal"><div class="modal">
  <h2>DeepSeek API Key</h2>
  <p id="keyStatus" style="font-size:12px;color:var(--dim);margin-bottom:14px;"></p>
  <label>你自己的 API Key（可选）</label><input id="keyIn" type="password" placeholder="sk-...">
  <div class="hint">留空则使用共享额度</div>
  <div class="modal-acts"><button onclick="closeModals()">取消</button><button class="pri" onclick="doSaveKey()">保存</button></div>
</div></div>

<script>
const SKILL_NAMES = { quantitative:'量化扫描', narrative:'叙事追踪', syntax:'句法透视', biological:'生物透镜', cross_thread:'跨线索织网', temporal:'时间棱镜', distress:'急性协议' };

let S = { containers:[], activeC:null, threads:[], activeT:null, type:'reflect', streaming:false, newThread:true,
  pinnedContextId:null, contextThread:null,
  pinnedEntryIds: new Set(), entryPickerData: [], entryPickerOpen: false,
  showDashboard: false, dashData: null,
  mobPanel: 'containers' // 'containers' | 'threads' | 'chat'
};

const isMobile = () => window.innerWidth <= 768;

// === Mobile nav ===
function mobUpdate() {
  if (!isMobile()) return;
  const back = document.getElementById('mobBack');
  const title = document.getElementById('mobTitle');
  const sub = document.getElementById('mobSub');
  if (S.mobPanel === 'containers') {
    back.style.display = 'none';
    title.textContent = '照鉴';
    sub.textContent = '';
  } else if (S.mobPanel === 'threads') {
    back.style.display = '';
    title.textContent = S.activeC?.name || '';
    sub.textContent = '';
  } else if (S.mobPanel === 'chat') {
    back.style.display = '';
    title.textContent = S.showDashboard ? '趋势' : (S.activeT?.title || '新日记');
    sub.textContent = S.activeC?.name || '';
  }
}

function mobShow(panel) {
  S.mobPanel = panel;
  const p1 = document.getElementById('p1');
  const p2 = document.getElementById('p2');
  const p3 = document.getElementById('p3');
  // Reset all
  [p1, p2, p3].forEach(p => p.classList.remove('mob-hidden','mob-right','mob-visible'));
  if (panel === 'containers') {
    p1.classList.add('mob-visible');
    p2.classList.add('mob-right');
    p3.classList.add('mob-right');
  } else if (panel === 'threads') {
    p1.classList.add('mob-hidden');
    p2.classList.add('mob-visible');
    p3.classList.add('mob-right');
  } else {
    p1.classList.add('mob-hidden');
    p2.classList.add('mob-hidden');
    p3.classList.add('mob-visible');
  }
  mobUpdate();
}

function mobGoBack() {
  if (S.mobPanel === 'chat') mobShow('threads');
  else if (S.mobPanel === 'threads') mobShow('containers');
}

// Handle resize: desktop restores normal flow
window.addEventListener('resize', () => {
  const p1 = document.getElementById('p1');
  const p2 = document.getElementById('p2');
  const p3 = document.getElementById('p3');
  if (!isMobile()) {
    [p1, p2, p3].forEach(p => p.classList.remove('mob-hidden','mob-right','mob-visible'));
  } else {
    mobShow(S.mobPanel);
  }
});

// === Helpers ===
function affectColor(v,i) {
  const hue = v<0 ? 210+v*30 : 40+v*20;
  return `hsl(${hue}, ${20+i*60}%, ${30+i*25}%)`;
}
function renderDerived(dj) {
  if(!dj) return '';
  try {
    const ds = typeof dj==='string' ? JSON.parse(dj) : dj;
    if(!ds||typeof ds!=='object') return '';
    let h='<div class="derived-bar">';
    if(ds.affect_valence!=null&&ds.affect_intensity!=null) {
      const c=affectColor(ds.affect_valence,ds.affect_intensity);
      const vl=ds.affect_valence>0.3?'+':ds.affect_valence<-0.3?'−':'·';
      h+=`<span class="affect-dot" style="background:${c}" title="v:${ds.affect_valence.toFixed(2)} i:${ds.affect_intensity.toFixed(2)}"></span>`;
      h+=`<span class="affect-label">${vl}${Math.abs(ds.affect_valence).toFixed(1)} · i${ds.affect_intensity.toFixed(1)}</span>`;
    }
    if(ds.theme_tags?.length) h+=ds.theme_tags.map(t=>`<span class="theme-tag">${esc(t)}</span>`).join('');
    if(ds.distortion_flags?.length) h+=ds.distortion_flags.map(d=>`<span class="distortion-tag">${esc(d)}</span>`).join('');
    h+='</div>'; return h;
  } catch(e){return '';}
}
function renderMiniDerived(ds) {
  if(!ds) return '';
  let h='';
  if(ds.affect_valence!=null&&ds.affect_intensity!=null) {
    h+=`<span class="affect-dot" style="background:${affectColor(ds.affect_valence,ds.affect_intensity)}"></span>`;
  }
  if(ds.theme_tags?.length) h+=ds.theme_tags.slice(0,3).map(t=>`<span class="theme-tag">${esc(t)}</span>`).join('');
  return h;
}

// === Init ===
async function init(){
  const me=await(await fetch('/api/auth/me')).json();
  if(!me.authenticated){location.reload();return;}
  document.getElementById('uname').textContent=me.username;
  const cfg=await(await fetch('/api/config')).json();
  const kb=document.getElementById('keyBtn');
  kb.textContent=cfg.has_own_key?'⚙ 自有Key':cfg.has_shared_key?'⚙ 共享额度':'⚙ 设置Key';
  if(cfg.has_own_key||cfg.has_shared_key) kb.classList.add('cfg');
  await loadContainers();
  if (isMobile()) mobShow('containers');
}

async function loadContainers(){ S.containers=(await(await fetch('/api/containers')).json()).containers; renderContainers(); }
function renderContainers(){
  document.getElementById('cList').innerHTML=S.containers.map(c=>`
    <div class="list-item ${S.activeC?.id===c.id?'active':''}" onclick="selectContainer('${c.id}')">
      <div class="name">${esc(c.name)}</div><div class="meta">${c.thread_count} 条</div>
      <button class="del" onclick="event.stopPropagation();delContainer('${c.id}')">×</button>
    </div>`).join('');
}
async function selectContainer(id){
  S.activeC=S.containers.find(c=>c.id===id); S.activeT=null; S.newThread=false;
  S.pinnedEntryIds.clear(); S.pinnedContextId=null; S.contextThread=null;
  S.showDashboard=false;
  renderContainers();
  document.getElementById('p2').style.display='flex';
  document.getElementById('cnameLbl').textContent=S.activeC.name;
  document.getElementById('dashBtn').classList.remove('active');
  await loadThreads(); showEmpty('选择一条日记或创建新日记');
  if (isMobile()) mobShow('threads');
}
async function doCreateContainer(){
  const n=document.getElementById('cNameIn').value.trim(); if(!n) return;
  const d=document.getElementById('cDescIn').value.trim();
  const c=await(await fetch('/api/containers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,description:d})})).json();
  S.containers.unshift(c); closeModals(); document.getElementById('cNameIn').value=''; document.getElementById('cDescIn').value='';
  selectContainer(c.id);
}
async function delContainer(id){
  if(!confirm('删除此容器及所有日记？')) return;
  await fetch(`/api/containers/${id}`,{method:'DELETE'});
  S.containers=S.containers.filter(c=>c.id!==id);
  if(S.activeC?.id===id){S.activeC=null;S.activeT=null;document.getElementById('p2').style.display='none';showEmpty('选择或创建一个容器');}
  renderContainers();
}

async function loadThreads(){ S.threads=(await(await fetch(`/api/containers/${S.activeC.id}/threads`)).json()).threads; renderThreads(); }
function renderThreads(){
  document.getElementById('tList').innerHTML=S.threads.map(t=>{
    const d=new Date(t.updated).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    const isPinned=S.pinnedContextId===t.id;
    return `<div class="thread-item ${S.activeT?.id===t.id?'active':''}" onclick="selectThread('${t.id}')">
      <div style="display:flex;align-items:center;gap:6px"><span class="ttype ${t.type}">${t.type==='vent'?'倾诉':'审视'}</span><span class="tmeta">${d}</span></div>
      <div class="title">${esc(t.title)}</div>
      <button class="pin-btn ${isPinned?'pinned':''}" onclick="event.stopPropagation();togglePin('${t.id}')" title="${isPinned?'取消锁定':'设为参照'}">⊙</button>
      <button class="del" onclick="event.stopPropagation();delThread('${t.id}')">×</button>
    </div>`;
  }).join('');
}
async function selectThread(id){
  S.activeT=S.threads.find(t=>t.id===id); S.newThread=false;
  S.showDashboard=false; document.getElementById('dashBtn').classList.remove('active');
  S.pinnedEntryIds.clear(); closeEntryPicker(); updatePinBtn();
  renderThreads();
  const data=await(await fetch(`/api/threads/${id}`)).json();
  S.activeT._msgs=data.messages; showChat(); renderMessages();
  document.getElementById('typeTog').style.display='none';
  document.getElementById('inp').placeholder='回应...';
  document.getElementById('sendBtn').textContent='回应';
  if (isMobile()) mobShow('chat');
}
function startNewThread(){
  S.activeT=null; S.newThread=true;
  S.showDashboard=false; document.getElementById('dashBtn').classList.remove('active');
  S.pinnedEntryIds.clear(); closeEntryPicker(); updatePinBtn();
  renderThreads(); showChat();
  document.getElementById('feed').innerHTML='';
  document.getElementById('typeTog').style.display='flex';
  document.getElementById('inp').placeholder='写点什么...';
  document.getElementById('sendBtn').textContent='记录';
  document.getElementById('inp').focus();
  if (isMobile()) mobShow('chat');
}
async function delThread(id){
  if(!confirm('删除这条日记？')) return;
  await fetch(`/api/threads/${id}`,{method:'DELETE'});
  S.threads=S.threads.filter(t=>t.id!==id);
  if(S.activeT?.id===id){S.activeT=null;showEmpty('选择一条日记或创建新日记');}
  renderThreads(); loadContainers();
}
async function delMsg(mid){
  if(!confirm('删除这条记录和对应的观察？')) return;
  const res=await(await fetch(`/api/messages/${mid}`,{method:'DELETE'})).json();
  if(res.thread_deleted){S.threads=S.threads.filter(t=>t.id!==S.activeT?.id);S.activeT=null;showEmpty('选择一条日记或创建新日记');renderThreads();loadContainers();}
  else await reloadThread(S.activeT.id);
}

function renderSkillTags(sj){
  if(!sj)return''; try{const s=JSON.parse(sj);if(!Array.isArray(s)||!s.length)return'';
  return`<div class="skill-tags">${s.map(s=>`<span class="skill-tag" title="${s}">${SKILL_NAMES[s]||s}</span>`).join('')}</div>`;}catch(e){return'';}
}
function renderMessages(){
  if(!S.activeT?._msgs)return;
  const feed=document.getElementById('feed');
  feed.innerHTML=S.activeT._msgs.map(m=>{
    const time=new Date(m.timestamp).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    if(m.role==='user') return `<div class="msg"><div class="msg-head"><span class="msg-role user">日记</span><span class="msg-time">${time}</span></div><div class="msg-body user-text">${esc(m.content)}</div>${renderDerived(m.derived_state)}<button class="msg-del" onclick="delMsg('${m.id}')">×</button></div>`;
    const isVent=m.content==='已记录。';
    return `<div class="msg"><div class="msg-head"><span class="msg-role assistant">照鉴</span><span class="msg-time">${time}</span></div><div class="msg-body ${isVent?'vent-text':'ai-text'}">${esc(m.content)}</div>${renderSkillTags(m.skills_used)}${m.thinking?`<button class="think-toggle" onclick="togThink(this)">› 思考过程</button><div class="think-box">${esc(m.thinking)}</div>`:''}</div>`;
  }).join('')+'<div id="streamArea"></div>';
  scrollBot();
}
function togThink(b){const box=b.nextElementSibling;const o=box.classList.toggle('open');b.textContent=o?'⌄ 思考过程':'› 思考过程';}

// === Dashboard ===
async function toggleDashboard(){
  if(S.showDashboard){ S.showDashboard=false; document.getElementById('dashBtn').classList.remove('active'); showEmpty('选择一条日记或创建新日记'); return; }
  S.showDashboard=true; S.activeT=null; S.newThread=false;
  document.getElementById('dashBtn').classList.add('active');
  renderThreads();
  document.getElementById('emptyMsg').style.display='none';
  document.getElementById('chatView').style.display='none';
  document.getElementById('dashView').style.display='flex';
  document.getElementById('dashContent').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:11px">加载中...</div>';
  if(isMobile()) mobShow('chat');
  try {
    const res = await(await fetch(`/api/containers/${S.activeC.id}/trends`)).json();
    if(!res.trends) {
      document.getElementById('dashContent').innerHTML=`<div class="dash-empty"><div class="icon">◯</div><p>${res.reason==='no_derived_states'?'此容器的日记尚未产生分析数据。<br>写几篇审视类日记后，趋势会在这里显现。':'此容器还没有日记。'}</p></div>`;
      return;
    }
    renderDashboard(res.trends);
  } catch(e) {
    document.getElementById('dashContent').innerHTML=`<div class="dash-empty"><div class="icon">×</div><p>加载失败</p></div>`;
  }
}

function renderDashboard(t) {
  const dc = document.getElementById('dashContent');
  let h = '';

  // Stats row
  const vSign = t.avg_valence > 0.1 ? '+' : t.avg_valence < -0.1 ? '' : '';
  h += `<div class="dash-stats">
    <div class="dash-stat"><div class="val">${t.total_entries}</div><div class="lbl">总条目</div></div>
    <div class="dash-stat"><div class="val">${vSign}${t.avg_valence.toFixed(2)}</div><div class="lbl">平均效价</div></div>
    <div class="dash-stat"><div class="val">${t.avg_intensity.toFixed(2)}</div><div class="lbl">平均强度</div></div>
    <div class="dash-stat"><div class="val">${t.theme_freq.length}</div><div class="lbl">主题数</div></div>
  </div>`;

  // Affect timeline
  if (t.affect_timeline.length >= 2) {
    h += `<div class="dash-section">
      <div class="dash-section-title">情绪轨迹</div>
      <div class="affect-chart">${buildAffectSVG(t.affect_timeline)}</div>
      <div class="affect-legend">
        <span><span class="dot" style="background:var(--accdim)"></span> 效价 (valence)</span>
        <span><span class="dot" style="background:var(--vent)"></span> 强度 (intensity)</span>
      </div>
    </div>`;
  } else if (t.affect_timeline.length === 1) {
    const pt = t.affect_timeline[0];
    h += `<div class="dash-section">
      <div class="dash-section-title">情绪轨迹</div>
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">
        <span class="affect-dot" style="width:14px;height:14px;background:${affectColor(pt.valence, pt.intensity)}"></span>
        <span style="margin-left:8px;font-family:var(--mono)">v:${pt.valence.toFixed(2)} i:${pt.intensity.toFixed(2)}</span>
        <br><span style="font-size:11px;margin-top:4px;display:inline-block">需要更多条目以绘制轨迹</span>
      </div>
    </div>`;
  }

  // Theme frequency
  if (t.theme_freq.length) {
    const maxC = t.theme_freq[0].count;
    h += `<div class="dash-section"><div class="dash-section-title">主题分布</div><div class="bar-chart">`;
    for (const tf of t.theme_freq) {
      const pct = Math.max((tf.count / maxC) * 100, 4);
      h += `<div class="bar-row"><span class="bar-label">${esc(tf.tag)}</span><div class="bar-track"><div class="bar-fill theme" style="width:${pct}%"></div></div><span class="bar-count">${tf.count}</span></div>`;
    }
    h += '</div></div>';
  }

  // Distortion frequency
  if (t.distortion_freq.length) {
    const maxD = t.distortion_freq[0].count;
    h += `<div class="dash-section"><div class="dash-section-title">认知扭曲频率</div><div class="bar-chart">`;
    for (const df of t.distortion_freq) {
      const pct = Math.max((df.count / maxD) * 100, 4);
      h += `<div class="bar-row"><span class="bar-label">${esc(df.flag)}</span><div class="bar-track"><div class="bar-fill distortion" style="width:${pct}%"></div></div><span class="bar-count">${df.count}</span></div>`;
    }
    h += '</div></div>';
  }

  // Salience markers
  if (t.salience_markers.length) {
    h += `<div class="dash-section"><div class="dash-section-title">显著标记</div><div class="salience-list">`;
    for (const m of t.salience_markers) h += `<span class="salience-tag">${esc(m)}</span>`;
    h += '</div></div>';
  }

  // Activity
  if (t.activity.length) {
    h += `<div class="dash-section"><div class="dash-section-title">记录活动</div><div class="activity-row">`;
    const maxA = Math.max(...t.activity.map(a=>a.count));
    for (const a of t.activity) {
      const intensity = a.count / maxA;
      const bg = `hsl(260, ${20+intensity*40}%, ${12+intensity*20}%)`;
      const border = `hsl(260, ${20+intensity*30}%, ${20+intensity*15}%)`;
      h += `<div class="activity-day" style="background:${bg};border-color:${border}" title="${a.date}: ${a.count}条"></div>`;
    }
    h += '</div></div>';
  }

  dc.innerHTML = h;
}

function buildAffectSVG(timeline) {
  const W = 560, H = 160, PAD = 30, PADT = 10, PADR = 10;
  const n = timeline.length;
  const chartW = W - PAD - PADR, chartH = H - PADT - PAD;

  // X positions evenly spaced
  const xs = timeline.map((_, i) => PAD + (i / Math.max(n-1, 1)) * chartW);

  // Valence: -1 to 1 → top to bottom
  const vy = (v) => PADT + (1 - (v + 1) / 2) * chartH;
  // Intensity: 0 to 1 → bottom to top
  const iy = (v) => PADT + (1 - v) * chartH;

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines
  const gridLines = [-1, -0.5, 0, 0.5, 1];
  for (const gl of gridLines) {
    const y = vy(gl);
    svg += `<line x1="${PAD}" y1="${y}" x2="${W-PADR}" y2="${y}" stroke="#1e1e26" stroke-width="1"/>`;
    svg += `<text x="${PAD-4}" y="${y+3}" fill="#3a3a46" font-size="9" font-family="IBM Plex Mono,monospace" text-anchor="end">${gl > 0 ? '+' : ''}${gl}</text>`;
  }

  // Zero line emphasis
  svg += `<line x1="${PAD}" y1="${vy(0)}" x2="${W-PADR}" y2="${vy(0)}" stroke="#2a2a36" stroke-width="1" stroke-dasharray="4,3"/>`;

  // Valence line
  let vPath = `M ${xs[0]} ${vy(timeline[0].valence)}`;
  for (let i = 1; i < n; i++) vPath += ` L ${xs[i]} ${vy(timeline[i].valence)}`;
  svg += `<path d="${vPath}" fill="none" stroke="#5a5080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Intensity line
  let iPath = `M ${xs[0]} ${iy(timeline[0].intensity)}`;
  for (let i = 1; i < n; i++) iPath += ` L ${xs[i]} ${iy(timeline[i].intensity)}`;
  svg += `<path d="${iPath}" fill="none" stroke="#6b8f71" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,3"/>`;

  // Dots
  for (let i = 0; i < n; i++) {
    const c = affectColor(timeline[i].valence, timeline[i].intensity);
    svg += `<circle cx="${xs[i]}" cy="${vy(timeline[i].valence)}" r="4" fill="${c}" stroke="#08080a" stroke-width="1.5"/>`;
  }

  // Date labels (first, mid, last)
  const labelIdxs = n <= 5 ? timeline.map((_,i)=>i) : [0, Math.floor(n/2), n-1];
  for (const li of labelIdxs) {
    const d = timeline[li].timestamp.slice(5,10);
    svg += `<text x="${xs[li]}" y="${H-4}" fill="#3a3a46" font-size="9" font-family="IBM Plex Mono,monospace" text-anchor="middle">${d}</text>`;
  }

  svg += '</svg>';
  return svg;
}

// === Thread-level Context Pin ===
function togglePin(id){
  const thread=S.threads.find(t=>t.id===id);
  if(S.pinnedContextId===id){S.pinnedContextId=null;S.contextThread=null;document.getElementById('contextWin').classList.add('hidden');}
  else{S.pinnedContextId=id;S.contextThread=thread;showContextWindow({thread_id:id,title:thread.title,preview:thread.preview||'',auto:false});}
  renderThreads();
}
function clearContextPin(){S.pinnedContextId=null;S.contextThread=null;document.getElementById('contextWin').classList.add('hidden');renderThreads();}
function showContextWindow(data){
  document.getElementById('ctxTitle').textContent=data.title||'';
  document.getElementById('ctxPreview').textContent=data.preview||'';
  const badge=document.getElementById('ctxBadge');
  badge.textContent=data.auto?'AI选择':'已锁定';
  badge.className='ctx-badge '+(data.auto?'auto':'pinned');
  document.getElementById('contextWin').classList.remove('hidden');
}

// === Entry-level Context Pin ===
async function toggleEntryPicker(){
  if(S.entryPickerOpen){closeEntryPicker();return;}
  if(!S.activeC)return;
  const exclude=S.activeT?.id||'';
  const res=await(await fetch(`/api/containers/${S.activeC.id}/entries?exclude_thread=${exclude}`)).json();
  S.entryPickerData=res.entries||[];
  renderEntryPicker();
  document.getElementById('entryPicker').classList.add('open');
  S.entryPickerOpen=true;
}
function closeEntryPicker(){document.getElementById('entryPicker').classList.remove('open');S.entryPickerOpen=false;}
function renderEntryPicker(){
  const list=document.getElementById('epList');
  if(!S.entryPickerData.length){list.innerHTML='<div class="ep-empty">此容器暂无其他记录</div>';return;}
  list.innerHTML=S.entryPickerData.map(e=>{
    const sel=S.pinnedEntryIds.has(e.message_id);
    const d=new Date(e.timestamp).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    return `<div class="ep-item ${sel?'selected':''}" onclick="toggleEntryPin('${e.message_id}')">
      <div class="ep-item-head"><span class="ep-item-date">${d}</span><span class="ep-item-thread">${esc(e.thread_title)}</span></div>
      <div class="ep-item-preview">${esc(e.preview)}</div>
      <div class="ep-item-meta">${renderMiniDerived(e.derived_state)}</div>
    </div>`;
  }).join('');
}
function toggleEntryPin(mid){
  if(S.pinnedEntryIds.has(mid)) S.pinnedEntryIds.delete(mid);
  else if(S.pinnedEntryIds.size<5) S.pinnedEntryIds.add(mid);
  renderEntryPicker(); updatePinBtn();
}
function clearEntryPins(){S.pinnedEntryIds.clear();renderEntryPicker();updatePinBtn();}
function updatePinBtn(){
  const btn=document.getElementById('pinEntriesBtn');
  const n=S.pinnedEntryIds.size;
  btn.classList.toggle('has-pins',n>0);
  btn.innerHTML=n>0?`参照 <span class="pin-count">${n}</span>`:'参照';
}

// === Send ===
async function doSend(){
  if(S.streaming)return;
  const inp=document.getElementById('inp');
  const text=inp.value.trim(); if(!text)return;
  const btn=document.getElementById('sendBtn'); btn.disabled=true;
  closeEntryPicker();

  if(S.newThread||!S.activeT){
    const res=await(await fetch(`/api/containers/${S.activeC.id}/threads`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,type:S.type})})).json();
    inp.value='';onInput();
    await loadThreads();loadContainers();
    S.activeT=S.threads.find(t=>t.id===res.thread_id);
    if(!res.stream){await selectThread(res.thread_id);btn.disabled=false;return;}
    const td=await(await fetch(`/api/threads/${res.thread_id}`)).json();
    S.activeT._msgs=td.messages;S.newThread=false;renderThreads();showChat();renderMessages();
    document.getElementById('typeTog').style.display='none';
    document.getElementById('inp').placeholder='回应...';
    document.getElementById('sendBtn').textContent='回应';
    S.streaming=true; await stream(res.thread_id); S.streaming=false;btn.disabled=false;
    await reloadThread(res.thread_id);
  } else {
    await fetch(`/api/threads/${S.activeT.id}/reply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    inp.value='';onInput();
    const td=await(await fetch(`/api/threads/${S.activeT.id}`)).json();
    S.activeT._msgs=td.messages;renderMessages();
    S.streaming=true; await stream(S.activeT.id); S.streaming=false;btn.disabled=false;
    await reloadThread(S.activeT.id);
  }
}
async function reloadThread(tid){const td=await(await fetch(`/api/threads/${tid}`)).json();S.activeT._msgs=td.messages;renderMessages();loadThreads();}

async function stream(tid){
  const area=document.getElementById('streamArea');
  area.innerHTML=`<div class="stream-block"><div class="stream-skills" id="sSkills"></div><div class="stream-phase" id="sPhase">思考中...</div><div class="stream-think" id="sThink"></div><div class="stream-content" id="sCont" style="display:none"></div><div class="stream-derived" id="sDerived"></div></div>`;
  scrollBot();
  const body = {
    pinned_context_id: S.pinnedContextId || null,
    pinned_entry_ids: S.pinnedEntryIds.size > 0 ? [...S.pinnedEntryIds] : null
  };
  return new Promise(resolve=>{
    fetch(`/api/threads/${tid}/observe`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>{
      const reader=r.body.getReader();const dec=new TextDecoder();let buf='';let hasCont=false;
      while(true){
        const{done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
        for(const ln of lines){
          if(!ln.startsWith('data: '))continue;
          try{
            const d=JSON.parse(ln.slice(6));
            if(d.type==='skills'){document.getElementById('sSkills').innerHTML=d.skills.map(s=>`<span class="skill-tag">${SKILL_NAMES[s]||s}</span>`).join('');}
            if(d.type==='thinking'){const e=document.getElementById('sThink');e.textContent+=d.text;e.scrollTop=e.scrollHeight;scrollBot();}
            if(d.type==='content'){if(!hasCont){hasCont=true;document.getElementById('sPhase').textContent='观察';document.getElementById('sThink').style.display='none';document.getElementById('sCont').style.display='block';}document.getElementById('sCont').textContent+=d.text;scrollBot();}
            if(d.type==='derived'){document.getElementById('sDerived').innerHTML=renderDerived(d.data);}
            if(d.type==='context'){showContextWindow(d.data);}
            if(d.type==='error'){area.innerHTML+=`<div class="err-msg">${esc(d.text)}</div>`;resolve();return;}
            if(d.type==='done'){resolve();return;}
          }catch(e){}
        }
      }resolve();
    }).catch(()=>resolve());
  });
}

// === View helpers ===
function showChat(){
  document.getElementById('emptyMsg').style.display='none';
  document.getElementById('dashView').style.display='none';
  document.getElementById('chatView').style.display='flex';
  S.showDashboard=false;
  document.getElementById('dashBtn').classList.remove('active');
  mobUpdate();
}
function showEmpty(msg){
  document.getElementById('chatView').style.display='none';
  document.getElementById('dashView').style.display='none';
  const e=document.getElementById('emptyMsg');e.style.display='flex';e.querySelector('p').textContent=msg;
}
function setType(t){S.type=t;document.querySelectorAll('.type-tog button').forEach(b=>{b.classList.toggle('on',b.dataset.t===t);b.classList.toggle(t,b.dataset.t===t);});}
function onInput(){const i=document.getElementById('inp');document.getElementById('cc').textContent=i.value.length;i.style.height='auto';i.style.height=Math.min(i.scrollHeight,180)+'px';}
function scrollBot(){const f=document.getElementById('feed');if(f)f.scrollTop=f.scrollHeight;}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'):''}

function openModal(t){closeModals();document.getElementById(t+'Modal').classList.add('open');const i=document.querySelector(`#${t}Modal input`);if(i)setTimeout(()=>i.focus(),80);}
function closeModals(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));}
async function doSaveKey(){const k=document.getElementById('keyIn').value.trim();await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:k})});const b=document.getElementById('keyBtn');b.classList.add('cfg');b.textContent=k?'⚙ 自有Key':'⚙ 共享额度';document.getElementById('keyIn').value='';closeModals();}
async function doLogout(){await fetch('/api/auth/logout',{method:'POST'});location.reload();}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModals();closeEntryPicker();}if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();doSend();}});
document.querySelectorAll('.modal-bg').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModals();}));

init();
</script>
